name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore OperationsSystem.slnx

      - name: Build (warnings as errors)
        run: dotnet build OperationsSystem.slnx --configuration Release --no-restore

      - name: Domain unit tests
        run: |
          dotnet test tests/Identity.Domain.UnitTests/Identity.Domain.UnitTests.csproj --configuration Release --no-build
          dotnet test tests/MasterData.Domain.UnitTests/MasterData.Domain.UnitTests.csproj --configuration Release --no-build

      - name: Integration tests (SQL Server Testcontainers)
        # The GitHub-hosted Ubuntu runner provides Docker, which Testcontainers uses to start SQL Server.
        run: |
          dotnet test tests/Identity.IntegrationTests/Identity.IntegrationTests.csproj --configuration Release --no-build
          dotnet test tests/MasterData.IntegrationTests/MasterData.IntegrationTests.csproj --configuration Release --no-build

  vulnerability-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore OperationsSystem.slnx

      - name: Audit for vulnerable packages
        # Fail the job if any restored package has a known vulnerability.
        run: |
          dotnet list OperationsSystem.slnx package --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -q "has the following vulnerable packages" audit.txt; then
            echo "::error::Vulnerable packages detected."
            exit 1
          fi
