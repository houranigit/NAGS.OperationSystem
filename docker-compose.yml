services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: operationssystem-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - operationssystem-sql-data:/var/opt/mssql

volumes:
  operationssystem-sql-data:
